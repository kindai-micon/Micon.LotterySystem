name: Deploy Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj

      - name: Build
        run: dotnet build Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output ./publish-desktop

      - name: Create ZIP archive
        run: Compress-Archive -Path ./publish-desktop/* -DestinationPath ./Micon.LotterySystem.Desktop-win-x64.zip

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Desktop App ${{ steps.get_version.outputs.VERSION }}
          files: ./Micon.LotterySystem.Desktop-win-x64.zip
          generate_release_notes: true

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Micon.LotterySystem.Desktop-win-x64
          path: ./Micon.LotterySystem.Desktop-win-x64.zip
