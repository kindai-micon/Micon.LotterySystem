name: Deploy Desktop App

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj

      - name: Build
        run: dotnet build Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output ./publish-desktop

      - name: Create ZIP archive
        run: Compress-Archive -Path ./publish-desktop/* -DestinationPath ./Micon.LotterySystem.Desktop-win-x64.zip

      - name: Get version from csproj
        id: get_version
        run: |
          $xml = [xml](Get-Content Micon.LotterySystem.Desktop/Micon.LotterySystem.Desktop.csproj)
          $versionPrefix = $xml.Project.PropertyGroup.VersionPrefix
          echo "VERSION_PREFIX=$versionPrefix" >> $env:GITHUB_OUTPUT

      - name: Get next patch version
        id: get_patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          prefix="${{ steps.get_version.outputs.VERSION_PREFIX }}"
          tags=$(gh api repos/${{ github.repository }}/tags --paginate 100 2>/dev/null | jq -r '.[].name' 2>/dev/null || echo "")
          latest=$(echo "$tags" | grep "^desktop-v$prefix\." | sed "s/desktop-v$prefix\.//" | sort -n | tail -1)
          if [ -n "$latest" ]; then
            nextPatch=$((latest + 1))
          else
            nextPatch=0
          fi
          echo "PATCH=$nextPatch" >> $GITHUB_OUTPUT
          echo "FULL_VERSION=$prefix.$nextPatch" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.get_patch.outputs.FULL_VERSION }}
          name: Desktop App ${{ steps.get_patch.outputs.FULL_VERSION }}
          files: ./Micon.LotterySystem.Desktop-win-x64.zip
          generate_release_notes: true
