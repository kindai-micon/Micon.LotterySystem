name: Deploy to Release Server

on:
  push:
    branches:
      - release

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Micon.LotterySystem/micon.lotterysystem.client/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd Micon.LotterySystem/micon.lotterysystem.client
          npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Micon.LotterySystem/Micon.LotterySystem.csproj

      - name: Build
        run: dotnet build Micon.LotterySystem/Micon.LotterySystem.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Micon.LotterySystem/Micon.LotterySystem.csproj --configuration Release --no-build --output ./publish-output

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APPSETTINGS_JSON: ${{ secrets.APPSETTINGS_JSON }}
        run: |
          DEPLOY_DIR="/var/www/miconlottery/publish"

          echo "Deploying to: $DEPLOY_DIR"

          # サービスファイルをアップロード
          scp -i ~/.ssh/deploy_key .deploy/miconlottery.service ${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/miconlottery.service

          # ファイルをアップロード（in-place上書き）
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            ./publish-output/ \
            ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DIR}/

          # appsettings.json を配置してサービス再起動
          APPSETTINGS_B64=$(echo -n "${APPSETTINGS_JSON}" | base64 -w 0)

          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} "APPSETTINGS_B64=${APPSETTINGS_B64}" 'bash -s' << 'EOF'

          # サービスファイルを更新
          mv /tmp/miconlottery.service /etc/systemd/system/miconlottery.service
          systemctl daemon-reload

          DEPLOY_DIR="/var/www/miconlottery/publish"

          # appsettings.json を配置（base64デコード）
          echo "$APPSETTINGS_B64" | base64 -d > $DEPLOY_DIR/appsettings.json

          # サービスを再起動
          systemctl restart miconlottery.service

          echo "Service restarted successfully"

          EOF
        shell: bash

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf ./publish-output
